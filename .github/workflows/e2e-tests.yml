name: Sovereign E2E Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile Kernel
      run: gcc -O3 -mavx2 -mfma test_kernel_benchmark.c kernel_karpathy.c -o test_bench -lm

    - name: Run Validations
      run: ./test_bench 2>&1 | tee output.log

    - name: Verify Correctness
      run: grep -q "\[PASS\] Correctness" output.log

    - name: Verify Consistency
      run: grep -q "\[PASS\] Consistency" output.log

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-logs
        path: output.log
